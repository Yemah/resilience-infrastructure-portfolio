###############################################################################
# Nginx Reverse Proxy - Zero Trust Gateway
# Context: Clinique Le Chatelet (HDS / NIS2 Compliance)
# Role: TLS Termination and Identity-Aware Proxy (IAP) routing via Authelia
###############################################################################

# Authelia Identity Provider (Localhost)
upstream authelia {
    server 127.0.0.1:9091;
}

# Node.js Medical Application (Isolated in DMZ)
upstream webapp {
    server 172.16.33.20:8080;
}

# Force HTTP to HTTPS redirection
server {
    listen 80;
    server_name portal.clinique-chatelet.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.clinique-chatelet.local;

    # SSL Certificates mapping
    ssl_certificate /etc/nginx/ssl/portal.crt;
    ssl_certificate_key /etc/nginx/ssl/portal.key;

    # 1. Route for Authelia Authentication portal
    location /authelia {
        proxy_pass http://authelia;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Internal Auth Request verification endpoint (The Zero Trust Gatekeeper)
    location = /authelia/api/verify {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        proxy_set_header Host $http_host;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Protected Application Route
    location / {
        # Enforce authentication via Authelia before passing the request
        auth_request /authelia/api/verify;
        
        # If not authenticated (401), redirect to Authelia login page
        error_page 401 =302 https://$server_name/authelia/?rd=$scheme://$http_host$request_uri;

        include snippets/authelia-location.conf;

        # Forward authorized traffic to the Node.js application
        proxy_pass http://webapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}