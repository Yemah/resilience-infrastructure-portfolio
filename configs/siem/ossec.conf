<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall> <!-- Passé à 'no' pour le repo Git (best practice) -->
    <email_notification>yes</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh-alerts@health-corp.internal</email_from>
    <email_to>soc-team@health-corp.internal</email_to>
    <email_maxperhour>12</email_maxperhour>
  </global>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- System inventory -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
  </wodle>

  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://<IP_WAZUH_INDEXER>:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/filebeat/certs/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/filebeat/certs/wazuh-server.pem</certificate>
      <key>/etc/filebeat/certs/wazuh-server-key.pem</key>
    </ssl>
  </indexer>

  <!-- File integrity monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>
    <!-- Les fichiers sensibles à surveiller dans ton projet -->
    <directories check_all="yes">/etc/authelia,/etc/nginx</directories>
  </syscheck>

  <cluster>
    <name>wazuh-cluster</name>
    <node_name>master-node</node_name>
    <node_type>master</node_type>
    <key>REPLACE_WITH_SECURE_KEY</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
        <node>MASTER_NODE_IP</node>
    </nodes>
    <disabled>yes</disabled>
  </cluster>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/application.log</location>
  </localfile>

</ossec_config>